name: CI

on:
    push:
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm type:check

            - name: Lint
              run: pnpm lint:check

            - name: Format check
              run: pnpm format:check

            - name: Run tests
              run: pnpm test:run

    build:
        name: Build (${{ matrix.platform }})
        needs: check
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: windows-latest
                    - platform: macos-latest
                    - platform: ubuntu-22.04
        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install system dependencies (Ubuntu)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Check Rust formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

            - name: Build Tauri app
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload installers
              uses: actions/upload-artifact@v4
              with:
                  name: touchai-installers-${{ matrix.platform }}
                  path: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/dmg/*.dmg
                      src-tauri/target/release/bundle/deb/*.deb
                      src-tauri/target/release/bundle/appimage/*.AppImage
                  if-no-files-found: warn

            - name: Upload portable (Windows)
              if: matrix.platform == 'windows-latest'
              uses: actions/upload-artifact@v4
              with:
                  name: touchai-portable-windows
                  path: src-tauri/target/release/TouchAI.exe
                  if-no-files-found: warn

            - name: Upload portable (macOS)
              if: matrix.platform == 'macos-latest'
              uses: actions/upload-artifact@v4
              with:
                  name: touchai-portable-macos
                  path: src-tauri/target/release/bundle/macos/*.app
                  if-no-files-found: warn

            - name: Upload portable (Linux)
              if: matrix.platform == 'ubuntu-22.04'
              uses: actions/upload-artifact@v4
              with:
                  name: touchai-portable-linux
                  path: src-tauri/target/release/touchai
                  if-no-files-found: warn
